name: Terraform Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    name: 'Terraform Action'
    runs-on: ubuntu-latest

    # Global setting to run all steps inside the tf/ subdirectory
    defaults:
      run:
        working-directory: ./tf

    steps:
    # 1. Checkout repository code
    - name: Checkout Code
      uses: actions/checkout@v6.0.2

    # 2. Authenticate to Google Cloud using WIF
    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
        # Generates credentials file directly inside the working directory workspace
        create_credentials_file: true

    # 3. Setup Terraform CLI on the runner
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3.1.2
      with:
        terraform_version: "1.15.4"

    # 4. Initialize Terraform config inside the tf/ folder
    - name: Terraform Init
      run: |
        # Pass the name of tfstate-bucket to terraform via GitHub Actions Workflow
        terraform init \
          -backend-config="bucket=${{ vars.GCP_PROJECT_ID }}-tfstate" \
          -backend-config="prefix=terraform/state"

    # 5. Check code formatting
    - name: Terraform Format
      run: terraform fmt -check

    # 6. Generate speculative execution plan
    - name: Terraform Plan
      run: terraform plan -var="gcp_project_id=${{ vars.GCP_PROJECT_ID }}"

    # 7. Apply infrastructure changes (Main branch pushes only)
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve -var="gcp_project_id=${{ vars.GCP_PROJECT_ID }}"

    # 8. Enable outputs: Explicitly output sensitive data to GitHub Actions logs
    - name: View Firebase Configuration
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        echo "===================================================="
        echo "Firebase Frontend Configuration Generated by GCP:"
        echo "===================================================="
        # The -json flag bypasses the <sensitive> mask layout inside runner logs
        terraform output -json firebase_config
        echo "===================================================="

    # 9. Save pure Firebase json-config
    - name: Generate Firebase Client Config
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        mkdir -p ./frontend-config

        # 1. Extract pure JSON from terraform outputs, bypassing the sensitive mask
        # 2. Save it directly into a clean JSON file
        terraform output -json firebase_config > ./frontend-config/firebase-config.json

        echo " Firebase configuration successfully generated!"
        echo " File preview (keys are masked by GitHub for security):"
        cat ./frontend-config/firebase-config.json

    # 10. Опціонально: зберігаємо конфіг як артефакт GitHub Actions,
    # щоб розробники могли завантажити його прямо з вкладки Actions
    - name: Upload Firebase Config Artifact
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: firebase-client-config
        path: ./frontend-config/firebase-config.json
        retention-days: 7
