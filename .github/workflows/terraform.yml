name: Terraform check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  terraform:
    name: 'Terraform Action'
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout repository code using modern Node.js 24 compatible action
    - name: Checkout Code
      uses: actions/checkout@v6.0.2

    # 2. Setup Terraform CLI on the runner
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3.1.2
      with:
        terraform_version: "1.15.4"


    # 4. check Terraform
    - name: Terraform Init
      run: |
        echo "Display default terraform version"
        terraform version
        echo "Display Node.js version"
        node -v
